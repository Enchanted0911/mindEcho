server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mindEcho
  profiles:
    active: dev
  autoconfigure:
    exclude:
      # PgVectorStore 由 VectorStoreConfig 手动配置（使用 Ollama bge-m3 Embedding），禁用自动装配
      # 避免 PgVectorStoreAutoConfiguration 因同时存在 ollamaEmbeddingModel 和 openAiEmbeddingModel 而报错
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mindecho}?stringtype=unspecified
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-init-sql: SET TIME ZONE 'Asia/Shanghai'

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
          max-tokens: 2048
          additionalOptions:
            prefix_caching_enabled: true
      embedding:
        options:
          model: text-embedding-3-small
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: bge-m3
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: false

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mindecho.module
  type-handlers-package: com.mindecho.common.config
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}
  login-url: https://api.weixin.qq.com/sns/jscode2session
  pay:
    mch-id: ${WECHAT_PAY_MCH_ID:}
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    cert-serial-no: ${WECHAT_PAY_CERT_SERIAL_NO:}
    private-key: ${WECHAT_PAY_PRIVATE_KEY:}
    platform-cert: ${WECHAT_PAY_PLATFORM_CERT:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:https://your-domain.com/api/payment/wx-callback}
    base-url: https://api.mch.weixin.qq.com

jwt:
  secret: ${JWT_SECRET:mindecho-jwt-secret-key-please-change-in-production-2024}
  expire: 604800

mindecho:
  risk:
    high-risk-keywords: 自杀,轻生,割腕,跳楼,活着没意义,不想活了,去死,结束生命,自残
    medium-risk-keywords: 活不下去,太痛苦了,撑不住了,绝望,没有希望
  safety-hotline: "北京心理危机研究与干intervention中心：010-82951332；全国心理援助热线：400-161-9995"
  free-daily-messages: 1000
  reranker:
    # Ollama 服务地址（与 embedding 共用同一 ollama 实例）
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    # 部署的 BGE Reranker 模型名
    model: dengcao/bge-reranker-v2-m3
    # Rerank 后最终保留的记忆条数
    top-k: 5
    # relevance_score 截断阈值（低于此值丢弃）
    score-cutoff: 0.05
  memory:
    summary-threshold: 6
    # 结构化记忆 Redis 缓存配置
    cache-ttl-hours: 24             # 每个用户结构化记忆缓存 TTL（小时），防止内存无限堆积
    # 记忆遗忘配置
    max-memory-count: 1000          # 每个用户 Memory 表最大存储条数，超出触发遗忘压缩
    max-vector-count: 1000          # 每个用户 memory_vector 表最大存储条数，超出触发遗忘压缩
    half-life-days: 30              # recency_norm 指数衰减半衰期（天），推荐30天

billing:
  enabled: ${BILLING_ENABLED:false}
  base-points:
    chat: 5
    astrology: 10
    voice: 20
    image: 100
  context-tiers:
    tier2k: 2
    tier4k: 5
    tier8k: 10
    tier16k: 20
  pre-deduct:
    buffer-ratio: 0.3
    min-buffer: 10
  gift:
    new-user: 100

astrology:
  python-service:
    base-url: ${ASTROLOGY_PYTHON_URL:http://python-astrology-service:8000}
  rag:
    enabled: ${ASTROLOGY_RAG_ENABLED:true}

logging:
  level:
    com.mindecho: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mindecho.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

