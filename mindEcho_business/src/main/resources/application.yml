server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mindEcho
  profiles:
    active: dev

  # 数据库配置（留空，请在 application-dev.yml 中填写）
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mindecho}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis 配置（留空）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms

  # Spring AI 配置（DeepSeek，API Key 留空）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      # 注意：HTTP/1.1 强制（规避 DeepSeek RST_STREAM 问题）通过 SpringAiConfig#webClientBuilder() Bean 实现，
      #       而非此处的配置项（spring-ai 1.1.x 无 http-client.http2-disabled 属性）
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
          max-tokens: 2048
          # DeepSeek Prompt Cache（前缀缓存）
          # DeepSeek 服务端自动对 ≥64 tokens 的公共前缀进行缓存，命中时 token 费用降低 90%
          # 该字段触发 cache_control 上报，响应中 usage.prompt_cache_hit_tokens 可观察命中情况
          additionalOptions:
            prefix_caching_enabled: true
      embedding:
        options:
          model: text-embedding-3-small

  # Jackson 日期格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mindecho.module.*.entity,com.mindecho.module.billing.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0


# 微信小程序 + 微信支付 V3 配置
wechat:
  # 小程序登录
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}
  login-url: https://api.weixin.qq.com/sns/jscode2session
  # 微信支付 V3
  pay:
    # 商户号（mchid）
    mch-id: ${WECHAT_PAY_MCH_ID:}
    # 商户 API V3 密钥（32位，用于回调报文解密）
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    # 商户 API 证书序列号（Serial Number，在微信商户平台证书管理页查看）
    cert-serial-no: ${WECHAT_PAY_CERT_SERIAL_NO:}
    # 商户 API 私钥内容（apiclient_key.pem 文件内容，去掉头尾行，合并为单行）
    private-key: ${WECHAT_PAY_PRIVATE_KEY:}
    # 微信支付平台证书内容（下载后写入，用于验签；或配置 cert-url 动态加载）
    platform-cert: ${WECHAT_PAY_PLATFORM_CERT:}
    # 支付通知回调地址（公网可访问，https）
    notify-url: ${WECHAT_PAY_NOTIFY_URL:https://your-domain.com/api/payment/wx-callback}
    # 微信支付 V3 接口基础地址
    base-url: https://api.mch.weixin.qq.com

# JWT 配置
jwt:
  secret: ${JWT_SECRET:mindecho-jwt-secret-key-please-change-in-production-2024}
  expire: 604800  # 7天，单位：秒

# 应用自定义配置
mindecho:
  risk:
    high-risk-keywords: 自杀,轻生,割腕,跳楼,活着没意义,不想活了,去死,结束生命,自残
    medium-risk-keywords: 活不下去,太痛苦了,撑不住了,绝望,没有希望
  safety-hotline: "北京心理危机研究与干预中心：010-82951332；全国心理援助热线：400-161-9995"
  free-daily-messages: 1000
  memory:
    summary-threshold: 6  # 每累积 N 轮对话触发一次 AI 摘要压缩

# 积分计费配置
billing:
  # 是否启用计费（false = 跳过所有积分逻辑，便于开发调试）
  enabled: ${BILLING_ENABLED:true}
  # 基础费用（积分）
  base-points:
    chat: 5          # 普通聊天
    astrology: 10    # 占星解读（高级角色）
    voice: 20        # 语音聊天
    image: 100       # 图片生成
  # 上下文阶梯费用（积分）
  context-tiers:
    tier2k: 2        # 2k~4k token 额外积分
    tier4k: 5        # 4k~8k token 额外积分
    tier8k: 10       # 8k~16k token 额外积分
    tier16k: 20      # 16k~32k token 额外积分
  # 预扣安全缓冲
  pre-deduct:
    buffer-ratio: 0.3   # 安全缓冲比例（默认30%）
    min-buffer: 10      # 最低额外缓冲积分
  # 系统赠送
  gift:
    new-user: 100       # 新用户注册赠送积分（等于 1 元）

# 占星服务配置
astrology:
  # Python 占星计算服务地址（Kubernetes Service 名称或 IP）
  python-service:
    base-url: ${ASTROLOGY_PYTHON_URL:http://python-astrology-service:8000}
  # RAG 检索开关（false = 跳过 RAG，只使用 Memory + 星盘数据）
  rag:
    enabled: ${ASTROLOGY_RAG_ENABLED:true}

# 日志配置
logging:
  level:
    com.mindecho: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mindecho.log

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

