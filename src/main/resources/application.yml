server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mindEcho
  profiles:
    active: dev

  # 数据库配置（留空，请在 application-dev.yml 中填写）
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mindecho}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis 配置（留空）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms

  # Spring AI 配置（DeepSeek，API Key 留空）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
          max-tokens: 2048
      embedding:
        options:
          model: text-embedding-3-small

  # Jackson 日期格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mindecho.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0


# 微信小程序配置（留空）
wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}
  login-url: https://api.weixin.qq.com/sns/jscode2session

# JWT 配置
jwt:
  secret: ${JWT_SECRET:mindecho-jwt-secret-key-please-change-in-production-2024}
  expire: 604800  # 7天，单位：秒

# 应用自定义配置
mindecho:
  risk:
    high-risk-keywords: 自杀,轻生,割腕,跳楼,活着没意义,不想活了,去死,结束生命,自残
    medium-risk-keywords: 活不下去,太痛苦了,撑不住了,绝望,没有希望
  safety-hotline: "北京心理危机研究与干预中心：010-82951332；全国心理援助热线：400-161-9995"
  free-daily-messages: 10
  memory:
    summary-threshold: 6  # 每累积 N 轮对话触发一次 AI 摘要压缩

# 日志配置
logging:
  level:
    com.mindecho: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mindecho.log

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

